<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Typing Battle</title>

<style>
body {
 font-family: Arial;
 text-align:center;
 color:white;
 margin:0;
 background: linear-gradient(#1e1e2f, #3a3a5f);
 overflow:hidden;
}

/* 🌸 Sakura */
.petal {
 position:fixed;
 top:-10px;
 width:15px;
 height:15px;
 background:pink;
 border-radius:50%;
 opacity:0.7;
 animation:fall linear infinite;
}
@keyframes fall {
 to { transform:translateY(110vh) translateX(50px); }
}

/* Title */
h1 { font-size:50px; }

/* Timer */
#timer { font-size:70px; }

/* 🍣 Moving word */
#wordContainer {
 width:100%;
 overflow:hidden;
 height:80px;
 position:relative;
}
#word {
 position:absolute;
 font-size:60px;
 white-space:nowrap;
 left:100%;
 animation:slide 10s linear infinite;
}
@keyframes slide {
 from { left:100%; }
 to { left:-100%; }
}

/* Input + buttons */
input { font-size:30px; padding:10px; text-align:center; }
button { font-size:25px; padding:15px; margin:10px; }

/* Avatar select */
.select img {
 width:120px;
 cursor:pointer;
 border:4px solid transparent;
 border-radius:10px;
}
.selected {
 border:4px solid yellow;
 transform:scale(1.1);
}

/* HP */
.bar { width:500px; height:25px; background:#555; margin:10px auto; }
.hp { height:100%; background:lime; }

/* Characters */
.charBox {
 display:flex;
 justify-content:space-around;
 margin:20px;
}
.char {
 width:150px;
 transition:0.2s;
}

/* Attack */
.attack { transform:scale(1.5); }

/* Hit */
.hit {
 animation:hit 0.3s;
}
@keyframes hit {
 25%{ transform:translateX(-10px);}
 50%{ transform:translateX(10px);}
}

/* Shake */
.shake { animation:shake 0.2s infinite; }
@keyframes shake {
 50%{ transform:translate(-3px,-3px);}
}

/* 🎉 TEXT */
#bigText {
 position:fixed;
 top:40%;
 left:50%;
 transform:translate(-50%,-50%) scale(0.5);
 font-size:90px;
 font-weight:bold;
 opacity:0;
 pointer-events:none;
}
.show {
 animation:pop 0.6s ease;
}
@keyframes pop {
 0% { transform:translate(-50%,-50%) scale(0.3); opacity:0; }
 50% { transform:translate(-50%,-50%) scale(1.4); opacity:1; }
 100% { transform:translate(-50%,-50%) scale(1); opacity:0; }
}

/* Screens */
#game, #end { display:none; }
</style>
</head>

<body>

<h1>Typing Battle 🌸</h1>

<div id="setup">
<input id="name" placeholder="Your name"><br>

<select id="difficulty">
<option value="1">Easy</option>
<option value="2">Normal</option>
<option value="3">Hard</option>
</select>

<h3>Choose your character</h3>
<div class="select">
<img src="https://cdn-icons-png.flaticon.com/512/616/616430.png" onclick="chooseChar('cat',this)">
<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" onclick="chooseChar('dog',this)">
</div>

<button onclick="startGame()">Start Game</button>
</div>

<div id="game">
<h2 id="playerName"></h2>

<div class="charBox">
<img id="playerChar" class="char">
<img id="enemyChar" class="char">
</div>

<div class="bar"><div id="playerHP" class="hp"></div></div>
<div class="bar"><div id="enemyHP" class="hp"></div></div>

<div id="timer">10</div>

<div id="wordContainer">
<div id="word"></div>
</div>

<input id="input">
</div>

<div id="end">
<h2>Leaderboard</h2>
<ol id="board"></ol>
<button onclick="startGame()">Play Again</button>
<button onclick="location.reload()">Change Name</button>
</div>

<div id="bigText"></div>

<!-- sounds -->
<audio id="bgm" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b5c6c7e5.mp3" loop></audio>
<audio id="miss" src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_2.mp3"></audio>
<audio id="meow" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_cat_meow.mp3"></audio>
<audio id="bark" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_dog_bark.mp3"></audio>

<script>
const words = [
 {jp:"kantan", en:"easy"},
 {jp:"muzukashii", en:"difficult"},
 {jp:"aka", en:"red"},
 {jp:"getsuyobi", en:"monday"},
 {jp:"kayobi", en:"tuesday"},
 {jp:"suiyobi", en:"wednesday"},
 {jp:"mokuyobi", en:"thursday"},
 {jp:"kinyobi", en:"friday"},
 {jp:"doyobi", en:"saturday"},
 {jp:"nichiyobi", en:"sunday"}
];

let playerType="", playerHP, enemyHP, current, timer, timeLeft, startTime, difficulty;

/* WRONG MESSAGE SYSTEM */
const wrongMessages = [
 "OH NO!",
 "NICE TRY!",
 "ALMOST!",
 "TRY AGAIN!",
 "DON’T GIVE UP!"
];
let wrongPool = [...wrongMessages];

function showWrongText(){
 if(wrongPool.length===0) wrongPool=[...wrongMessages];

 const index=Math.floor(Math.random()*wrongPool.length);
 const msg=wrongPool[index];
 wrongPool.splice(index,1);

 const colors=["#ff4d4d","#ff944d","#ffd24d","#ff66ff"];

 const t=document.getElementById("bigText");
 t.textContent=msg;
 t.style.color=colors[Math.floor(Math.random()*colors.length)];

 t.classList.remove("show");
 void t.offsetWidth;
 t.classList.add("show");
}

/* PRAISE */
function showText(){
 const praises=["GOOD JOB!","EXCELLENT!","KEEP GOING!","AMAZING!","NICE!"];
 const colors=["#4dff88","#4dd2ff","#ffd24d","#ff66ff"];

 const t=document.getElementById("bigText");
 t.textContent=praises[Math.floor(Math.random()*praises.length)];
 t.style.color=colors[Math.floor(Math.random()*colors.length)];

 t.classList.remove("show");
 void t.offsetWidth;
 t.classList.add("show");
}

function chooseChar(type, el){
 playerType=type;
 document.querySelectorAll(".select img").forEach(i=>i.classList.remove("selected"));
 el.classList.add("selected");
}

function startGame(){
 if(!playerType) return alert("Choose character!");

 playerHP=100; enemyHP=100;
 difficulty=parseInt(document.getElementById("difficulty").value);

 document.getElementById("setup").style.display="none";
 document.getElementById("game").style.display="block";

 document.getElementById("playerName").textContent =
 document.getElementById("name").value || "Player";

 const p=document.getElementById("playerChar");
 const e=document.getElementById("enemyChar");

 if(playerType==="cat"){
  p.src="https://cdn-icons-png.flaticon.com/512/616/616430.png";
  e.src="https://cdn-icons-png.flaticon.com/512/616/616408.png";
 } else {
  p.src="https://cdn-icons-png.flaticon.com/512/616/616408.png";
  e.src="https://cdn-icons-png.flaticon.com/512/616/616430.png";
 }

 startTime=Date.now();
 nextWord();
 startTimer();
 updateHP();
}

function nextWord(){
 current = words[Math.floor(Math.random()*words.length)];
 const w=document.getElementById("word");
 w.style.animation="none";
 void w.offsetWidth;
 w.textContent=current.jp;
 w.style.animation="slide 10s linear infinite";
 document.getElementById("input").value="";
}

function startTimer(){
 clearInterval(timer);
 timeLeft=10;
 document.getElementById("timer").textContent=timeLeft;

 timer=setInterval(()=>{
  timeLeft--;
  document.getElementById("timer").textContent=timeLeft;

  if(timeLeft<=3) document.body.classList.add("shake");
  else document.body.classList.remove("shake");

  if(timeLeft<=0) wrong();
 },1000);
}

document.getElementById("input").addEventListener("keydown",e=>{
 if(e.key==="Enter"){
  if(e.target.value.toLowerCase()===current.en) correct();
  else wrong();
 }
});

function correct(){
 enemyHP-=10*difficulty;
 showText();

 if(playerType==="cat") document.getElementById("meow").play();
 else document.getElementById("bark").play();

 animate("playerChar","enemyChar");
 nextRound();
}

function wrong(){
 playerHP-=8*difficulty;
 document.getElementById("miss").play();
 showWrongText();
 animate("enemyChar","playerChar");
 nextRound();
}

function animate(a,t){
 document.getElementById(a).classList.add("attack");
 document.getElementById(t).classList.add("hit");
 setTimeout(()=>{
  document.getElementById(a).classList.remove("attack");
  document.getElementById(t).classList.remove("hit");
 },300);
}

function nextRound(){
 clearInterval(timer);
 updateHP();
 if(playerHP<=0||enemyHP<=0) endGame();
 else { nextWord(); startTimer(); }
}

function updateHP(){
 document.getElementById("playerHP").style.width=playerHP+"%";
 document.getElementById("enemyHP").style.width=enemyHP+"%";
}

function endGame(){
 document.getElementById("game").style.display="none";
 document.getElementById("end").style.display="block";
}

/* 🌸 petals */
for(let i=0;i<20;i++){
 let p=document.createElement("div");
 p.className="petal";
 p.style.left=Math.random()*100+"vw";
 p.style.animationDuration=(5+Math.random()*5)+"s";
 document.body.appendChild(p);
}
</script>

</body>
</html>
