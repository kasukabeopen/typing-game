<!DOCTYPE html>
<html lang="en">
<head>
<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Typing Battle Game</title>
<style>
body {
 font-family: "UD Digi Kyokasho NK-R", "Yu Gothic", Arial, sans-serif;
 text-align: center;
 color: white;
 overflow:hidden;
 margin:0;
 background-size: cover;
 transition: transform 0.6s ease, opacity 0.6s ease;
}

.zoom { transform: scale(1.2); opacity:0; }
.swipe { transform: translateX(-100%); opacity:0; }

#game, #endScreen, #bossWarning { display:none; }

.bar { width: 500px; height: 25px; background: #555; margin:15px auto; }
.hp { height:100%; background: lime; width:100%; transition: width 0.3s; }
.lowHP { animation: flash 0.5s infinite; }
@keyframes flash { 50% { background:red; } }

#word { font-size: 40px; margin:20px; }
#timer { font-size: 60px; margin:10px; }

input { font-size:25px; padding:10px; }
button { padding:15px 25px; font-size:22px; margin:8px; }

#battlefield { display:flex; justify-content:space-around; margin-top:30px; }
.character { width:180px; height:180px; }

.idle { animation: float 1s infinite alternate; }
@keyframes float { from{transform:translateY(0);} to{transform:translateY(-15px);} }

/* BIG FEEDBACK TEXT */
#bigText {
 position:fixed;
 top:40%; left:50%;
 transform:translate(-50%,-50%) scale(0.5);
 font-size:80px;
 font-weight:bold;
 opacity:0;
 transition: all 0.4s ease;
}
.showText {
 opacity:1;
 transform:translate(-50%,-50%) scale(1.2);
}

.shake { animation: shake 0.2s infinite; }
@keyframes shake {
0%{transform:translate(3px,3px);} 25%{transform:translate(-3px,3px);} 50%{transform:translate(3px,-3px);} 75%{transform:translate(-3px,-3px);} }

.avatar-option { width:100px; cursor:pointer; border:3px solid transparent; }
.selected { border-color: yellow; }

#bossWarning {
 position:fixed;
 top:0; left:0;
 width:100%; height:100%;
 background:black;
 color:red;
 font-size:60px;
 display:flex;
 justify-content:center;
 align-items:center;
 z-index:10;
}
</style>
</head>
<body>

<h1 style="font-size:50px;">Typing Battle</h1>

<div id="bigText"></div>
<audio id="bgm"></audio>

<div id="setup">
<input id="nickname" placeholder="Your name"><br>
<select id="difficulty">
<option value="1">Easy</option>
<option value="2">Normal</option>
<option value="3">Hard</option>
</select><br>
<img src="https://cdn-icons-png.flaticon.com/512/194/194938.png" class="avatar-option" data-src="https://cdn-icons-png.flaticon.com/512/194/194938.png">
<img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" class="avatar-option" data-src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
<img src="https://cdn-icons-png.flaticon.com/512/2922/2922510.png" class="avatar-option" data-src="https://cdn-icons-png.flaticon.com/512/2922/2922510.png"><br>
<button id="startBtn">Start Game</button>
</div>

<div id="bossWarning">⚠️ BOSS STAGE ⚠️</div>

<div id="game">
<h2 id="playerName"></h2>
<div id="battlefield">
<img id="playerChar" class="character idle">
<img id="enemyChar" class="character idle">
</div>

<div class="bar"><div id="playerHP" class="hp"></div></div>
<div class="bar"><div id="enemyHP" class="hp"></div></div>

<div id="timer">10</div>
<div id="word"></div>
<input id="input">
<div id="feedback"></div>
</div>

<div id="endScreen">
<h2 style="font-size:40px;">Leaderboard</h2>
<ol id="leaderboard"></ol>
<button onclick="restartSame()">Play Again</button>
<button onclick="resetGame()">Change Name/Avatar</button>
</div>

<script>
const backgrounds=[
"https://images.unsplash.com/photo-1501785888041-af3ef285b470?q=80&w=1600&auto=format&fit=crop",
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1600&auto=format&fit=crop",
"https://images.unsplash.com/photo-1520975922284-9e0fbead0d1b?q=80&w=1600&auto=format&fit=crop"];

const enemies=[
"https://cdn-icons-png.flaticon.com/512/616/616408.png",
"https://cdn-icons-png.flaticon.com/512/616/616430.png",
"https://cdn-icons-png.flaticon.com/512/616/616494.png"];

const music=[
"https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b5c6c7e5.mp3",
"https://cdn.pixabay.com/download/audio/2022/10/30/audio_946f0b6d9c.mp3",
"https://cdn.pixabay.com/download/audio/2023/03/28/audio_7e7c4bcd59.mp3"];

const words=[{jp:"kantan",en:"easy"},{jp:"muzukashii",en:"difficult"},{jp:"aka",en:"red"},{jp:"getsuyobi",en:"monday"},{jp:"kayobi",en:"tuesday"},{jp:"suiyobi",en:"wednesday"},{jp:"mokuyobi",en:"thursday"},{jp:"kinyobi",en:"friday"},{jp:"doyobi",en:"saturday"},{jp:"nichiyobi",en:"sunday"}];

let playerHP,enemyHP,current,timer,timeLeft,roundCount=0,startTime;
let selectedAvatar="";
let difficulty=1;

const bigText=document.getElementById('bigText');

function showBig(text){
 bigText.textContent=text;
 bigText.classList.add('showText');
 setTimeout(()=>bigText.classList.remove('showText'),600);
}

function changeStage(){
 let stage=0;
 if(roundCount>3) stage=1;
 if(roundCount>6) stage=2;

 document.body.style.background=`url(${backgrounds[stage]}) center/cover`;
 document.getElementById('enemyChar').src=enemies[stage];
 bgm.src=music[stage]; bgm.play();

 if(stage===2 && roundCount===7){
 document.getElementById('bossWarning').style.display='flex';
 setTimeout(()=>document.getElementById('bossWarning').style.display='none',2000);
 }
}

function correct(){
 let speedBonus = timeLeft>7 ? 5 : 0;
 enemyHP -= (10 + speedBonus) * difficulty;
 showBig(speedBonus?"CRITICAL HIT!":"GREAT!");
 nextRound();
}

function wrong(){
 playerHP -= 8 * difficulty;
 showBig("OOPS!");
 nextRound();
}

function updateHP(){
 let p=document.getElementById('playerHP');
 let e=document.getElementById('enemyHP');
 p.style.width=playerHP+'%';
 e.style.width=enemyHP+'%';
 if(playerHP<30) p.classList.add('lowHP'); else p.classList.remove('lowHP');
 if(enemyHP<30) e.classList.add('lowHP'); else e.classList.remove('lowHP');
}

function nextRound(){
 roundCount++;
 changeStage();
 updateHP(); clearInterval(timer);
 if(playerHP<=0||enemyHP<=0) endGame();
 else{ nextWord(); startTimer(); }
}

// (rest remains same but included)
</script>
</body>
</html>
